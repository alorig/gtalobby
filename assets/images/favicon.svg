<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2C98"/>
      <stop offset="50%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#27D9FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2C98;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#27D9FF;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#060714"/>
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88" fill="url(#glow)"/>
  <!-- Border accent -->
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="url(#bg)" stroke-width="6" opacity="0.6"/>
  <!-- G letter -->
  <text x="256" y="340" text-anchor="middle" font-family="'Space Grotesk','Inter',Arial,sans-serif" font-weight="800" font-size="320" fill="url(#bg)" letter-spacing="-10">G</text>
  <!-- Small accent dot -->
  <circle cx="380" cy="140" r="24" fill="#FF2C98" opacity="0.9"/>
  <circle cx="380" cy="140" r="12" fill="#27D9FF"/>
</svg>
