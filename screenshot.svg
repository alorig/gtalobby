<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060714"/>
      <stop offset="100%" stop-color="#0f1328"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <!-- Accent glow -->
  <circle cx="850" cy="350" r="300" fill="#FF2C98" opacity="0.08"/>
  <circle cx="350" cy="550" r="250" fill="#27D9FF" opacity="0.06"/>
  <!-- Logo -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF">GtaLobby</text>
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#A9B4DB">Your GTA Resource Hub</text>
  <!-- Color bar -->
  <rect x="420" y="480" width="90" height="6" rx="3" fill="#27D9FF"/>
  <rect x="520" y="480" width="90" height="6" rx="3" fill="#FF2C98"/>
  <rect x="620" y="480" width="90" height="6" rx="3" fill="#6C5CE7"/>
  <rect x="720" y="480" width="90" height="6" rx="3" fill="#0f1328" stroke="#2b3180" stroke-width="1"/>
  <!-- Version -->
  <text x="600" y="540" text-anchor="middle" font-family="monospace" font-size="14" fill="#8E9ECC">v1.0.0 — WordPress Theme</text>
</svg>
